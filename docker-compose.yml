# DecentralizedLLM: Model split across 3 layer nodes. No single node holds the full LLM.
services:
  # Layer nodes: each holds 1/3 of model layers (custom pipeline parallelism for CPU)
  node0:
    build:
      context: ./layer-nodes
      dockerfile: Dockerfile.node
    image: decentralizedllm-layer-node:latest
    container_name: decentralizedllm-node0
    environment:
      NODE_LAYERS: "0-8"
      MODEL_NAME: Qwen/Qwen2.5-0.5B-Instruct
    ports:
      - "8001:8001"
    command: ["uvicorn", "node:app", "--host", "0.0.0.0", "--port", "8001"]
    networks:
      - decentralized-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          # memory: 4G  # Uncomment if OOM; model load needs ~2GB per node

  node1:
    build:
      context: ./layer-nodes
      dockerfile: Dockerfile.node
    image: decentralizedllm-layer-node:latest
    container_name: decentralizedllm-node1
    environment:
      NODE_LAYERS: "8-16"
      MODEL_NAME: Qwen/Qwen2.5-0.5B-Instruct
    ports:
      - "8002:8002"
    command: ["sh", "-c", "sleep 45 && exec uvicorn node:app --host 0.0.0.0 --port 8002"]
    networks:
      - decentralized-net
    depends_on:
      node0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "2"
          # memory: 4G

  node2:
    build:
      context: ./layer-nodes
      dockerfile: Dockerfile.node
    image: decentralizedllm-layer-node:latest
    container_name: decentralizedllm-node2
    environment:
      NODE_LAYERS: "16-24"
      MODEL_NAME: Qwen/Qwen2.5-0.5B-Instruct
    ports:
      - "8003:8003"
    command: ["sh", "-c", "sleep 45 && exec uvicorn node:app --host 0.0.0.0 --port 8003"]
    networks:
      - decentralized-net
    depends_on:
      node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "2"
          # memory: 4G

  # Coordinator: chains node0 -> node1 -> node2 for inference
  coordinator:
    build:
      context: ./layer-nodes
      dockerfile: Dockerfile.coordinator
    image: decentralizedllm-coordinator:latest
    container_name: decentralizedllm-coordinator
    environment:
      NODE0_URL: http://node0:8001
      NODE1_URL: http://node1:8002
      NODE2_URL: http://node2:8003
    ports:
      - "8081:8080"
    depends_on:
      - node0
      - node1
      - node2
    networks:
      - decentralized-net

  gateway:
    build: ./gateway
    container_name: decentralizedllm-gateway
    ports:
      - "8080:8080"
    environment:
      VLLM_URL: http://coordinator:8080
    depends_on:
      - coordinator
    networks:
      - decentralized-net

  prometheus:
    image: prom/prometheus:latest
    container_name: decentralizedllm-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--web.enable-lifecycle"]
    networks:
      - decentralized-net

  grafana:
    image: grafana/grafana:latest
    container_name: decentralizedllm-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - decentralized-net

networks:
  decentralized-net:
    driver: bridge
