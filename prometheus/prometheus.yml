global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "node-1"
    static_configs:
      - targets: ["node-1:8000"]
        labels:
          node: "node-1"
  - job_name: "node-2"
    static_configs:
      - targets: ["node-2:8000"]
        labels:
          node: "node-2"
  - job_name: "node-3"
    static_configs:
      - targets: ["node-3:8000"]
        labels:
          node: "node-3"
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:8080"]
        labels:
          service: "gateway"
  - job_name: "vllm"
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "vllm-metal"